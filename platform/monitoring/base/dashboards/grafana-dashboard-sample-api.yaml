apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-sample-api
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/name: grafana
  annotations:
    k8s-sidecar-target-directory: /tmp/dashboards/gitops
data:
  sample-api-slo.json: |
    {
      "title": "Sample API SLO",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "30s",
      "panels": [
        {
          "type": "timeseries",
          "title": "Request Rate",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
          "targets": [
            {"expr": "sum(rate(http_requests_total{app=\"sample-api\"}[1m]))", "legendFormat": "rps"}
          ]
        },
        {
          "type": "timeseries",
          "title": "5xx Error Rate",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{app=\"sample-api\",status=~\"5..\"}[1m])) / clamp_min(sum(rate(http_requests_total{app=\"sample-api\"}[1m])), 1)",
              "legendFormat": "5xx rate"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "p95 Latency (s)",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 8},
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{app=\"sample-api\"}[5m])) by (le))",
              "legendFormat": "p95"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "CPU / Memory",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 8},
          "targets": [
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=~\"sample-api-(dev|stage|prod)\",pod=~\"sample-api-.*\"}[5m]))",
              "legendFormat": "cpu"
            },
            {
              "expr": "sum(container_memory_working_set_bytes{namespace=~\"sample-api-(dev|stage|prod)\",pod=~\"sample-api-.*\"})",
              "legendFormat": "memory"
            }
          ]
        }
      ]
    }
