apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
data:
  url: https://argocd.example.internal
  statusbadge.enabled: "true"
  timeout.reconciliation: 120s
  timeout.hard.reconciliation: 0s
  application.resourceTrackingMethod: annotation+label
  resource.compareoptions: |
    ignoreAggregatedRoles: true
  oidc.config: |
    name: CompanySSO
    issuer: https://your-oidc-provider.example.com
    clientID: ${ARGOCD_OIDC_CLIENT_ID}
    clientSecret: $oidc.clientSecret
    requestedScopes: ["openid", "profile", "email", "groups"]
  resource.customizations.health.argoproj.io_Rollout: |
    hs = {}
    if obj.status ~= nil then
      if obj.status.phase == "Healthy" then
        hs.status = "Healthy"
        hs.message = obj.status.phase
        return hs
      end
      if obj.status.phase == "Paused" then
        hs.status = "Suspended"
        hs.message = obj.status.phase
        return hs
      end
      if obj.status.phase == "Progressing" then
        hs.status = "Progressing"
        hs.message = obj.status.phase
        return hs
      end
      if obj.status.phase == "Degraded" then
        hs.status = "Degraded"
        hs.message = obj.status.phase
        return hs
      end
    end
    hs.status = "Progressing"
    hs.message = "Waiting for rollout status"
    return hs
