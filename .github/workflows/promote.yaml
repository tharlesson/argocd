name: Promote Image Between Environments

on:
  workflow_dispatch:
    inputs:
      source_env:
        description: Source environment
        required: true
        type: choice
        options:
          - dev
          - stage
      target_env:
        description: Target environment
        required: true
        type: choice
        options:
          - stage
          - prod
      image_tag:
        description: Optional explicit image tag (if empty uses source overlay tag)
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  promote:
    runs-on: ubuntu-latest
    environment: ${{ inputs.target_env == 'prod' && 'production' || 'staging' }}
    steps:
      - name: Validate env transition
        run: |
          if [[ "${{ inputs.source_env }}" == "dev" && "${{ inputs.target_env }}" != "stage" ]]; then
            echo "Only dev -> stage is allowed"
            exit 1
          fi
          if [[ "${{ inputs.source_env }}" == "stage" && "${{ inputs.target_env }}" != "prod" ]]; then
            echo "Only stage -> prod is allowed"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image tag
        id: resolve-tag
        run: |
          if [[ -n "${{ inputs.image_tag }}" ]]; then
            TAG="${{ inputs.image_tag }}"
          else
            TAG=$(awk '/newTag:/ {print $2}' apps/sample-api/overlays/${{ inputs.source_env }}/kustomization.yaml | tr -d '"')
          fi
          if [[ -z "$TAG" ]]; then
            echo "Could not resolve image tag"
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Update target overlay
        run: |
          chmod +x github-actions/scripts/update_tag.sh
          github-actions/scripts/update_tag.sh "${{ inputs.target_env }}" "${{ steps.resolve-tag.outputs.tag }}"

      - name: Create promotion PR
        uses: peter-evans/create-pull-request@v6
        with:
          branch: promotion/${{ inputs.source_env }}-to-${{ inputs.target_env }}-${{ github.run_number }}
          title: "Promote sample-api: ${{ inputs.source_env }} -> ${{ inputs.target_env }} (${{ steps.resolve-tag.outputs.tag }})"
          body: |
            GitOps promotion generated by workflow.

            - Source: `${{ inputs.source_env }}`
            - Target: `${{ inputs.target_env }}`
            - Image tag: `${{ steps.resolve-tag.outputs.tag }}`

            After merge, Argo CD reconciles target environment.
          commit-message: "chore(gitops): promote sample-api to ${{ inputs.target_env }} @ ${{ steps.resolve-tag.outputs.tag }}"
          add-paths: |
            apps/sample-api/overlays/${{ inputs.target_env }}/kustomization.yaml
