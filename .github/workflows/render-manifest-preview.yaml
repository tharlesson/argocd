name: Render Manifest Preview

on:
  pull_request:

permissions:
  contents: read

jobs:
  render:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        env: [dev, stage, prod]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: 5.4.3

      - name: Render manifests
        run: |
          mkdir -p rendered
          kustomize build environments/${{ matrix.env }} > rendered/${{ matrix.env }}.yaml

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rendered-${{ matrix.env }}
          path: rendered/${{ matrix.env }}.yaml
